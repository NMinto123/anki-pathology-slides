<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; }
  body { background: white; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script src="node_modules/pdfjs-dist/legacy/build/pdf.mjs" type="module"></script>
<script type="module">
import { getDocument } from './node_modules/pdfjs-dist/legacy/build/pdf.mjs';

const params = new URLSearchParams(window.location.search);
const pdfPath = params.get('pdf');
const pageNum = parseInt(params.get('page') || '1');
const scale = parseFloat(params.get('scale') || '2');

window.__renderDone = false;
window.__renderError = null;

async function render() {
  try {
    const resp = await fetch(pdfPath);
    const arrayBuffer = await resp.arrayBuffer();
    const data = new Uint8Array(arrayBuffer);
    const pdf = await getDocument({ data }).promise;
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale });
    const canvas = document.getElementById('c');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');
    await page.render({ canvasContext: ctx, viewport }).promise;
    window.__renderDone = true;
  } catch(e) {
    window.__renderError = e.message;
    window.__renderDone = true;
  }
}
render();
</script>
</body>
</html>
